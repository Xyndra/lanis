app-id: io.github.alessioc42.lanis.Devel
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: lanis

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --allow=devel
  - --filesystem=host
  # Keyring access for flutter_secure_storage
  - --talk-name=org.freedesktop.secrets
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: lanis
    buildsystem: simple
    build-commands:
      - install -Dm755 lanis /app/bin/lanis
      - cp -r data /app/bin/data
      - mkdir -p /app/bin/lib
      - cp lib/*.so /app/bin/lib/
      - install -Dm644 io.github.alessioc42.lanis.desktop /app/share/applications/io.github.alessioc42.lanis.Devel.desktop
      - install -Dm644 icon-512.png /app/share/icons/hicolor/512x512/apps/io.github.alessioc42.lanis.Devel.png
    sources:
      - type: dir
        path: ../../build/linux/x64/release/bundle
      - type: file
        path: icon-512.png
      - type: file
        path: io.github.alessioc42.lanis.desktop
